<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brand Pro - The Ultimate PWA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1E293B; --accent: #38BDF8; --bg: #F1F5F9; --card: #FFFFFF; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        .app-container { background: var(--card); width: 100%; max-width: 500px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 24px; font-weight: 900; margin-top: 0; margin-bottom: 15px;}
        .badge { background: #FFD700; color: #000; font-size: 11px; padding: 3px 8px; border-radius: 10px; vertical-align: middle; font-weight: 800;}
        
        .section-title { background: #E2E8F0; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: 800; color: #334155; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-weight: 700; font-size: 12px; color: #475569; margin-bottom: 4px; text-transform: uppercase;}
        .input-group input, .input-group textarea { width: 100%; padding: 10px; border: 2px solid #E2E8F0; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .input-group textarea { resize: vertical; min-height: 60px; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); outline: none; }
        
        /* Grid Layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .file-upload { background: #F8FAFC; padding: 10px; border-radius: 8px; border: 1px dashed #94A3B8; text-align: center; }
        .file-upload label { cursor: pointer; color: var(--primary); font-size: 11px; font-weight: bold;}
        .file-upload input { display: none; }

        /* Dynamic Buttons */
        .button-row { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-theme { 
            flex: 1 1 calc(33% - 8px); padding: 12px 5px; border: none; border-radius: 10px; 
            font-weight: 800; font-size: 11px; cursor: pointer; color: white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .btn-theme:active { transform: scale(0.95); }
        .btn-greeting { background: #F59E0B; }
        .btn-festival { background: #EC4899; }
        .btn-offer { background: #10B981; }
        .btn-news { background: #3B82F6; flex-basis: 100%; margin-top: 5px; }

        /* D-Pad Controls */
        .controls-wrapper { background: #F1F5F9; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; display: none; border: 2px solid #CBD5E1;}
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; max-width: 140px; margin: 0 auto; }
        .d-btn { background: #FFFFFF; border: 1px solid #CBD5E1; border-radius: 8px; padding: 8px; font-weight: bold; cursor: pointer;}
        .d-btn:active { background: #E2E8F0; }
        .zoom-controls { margin-top: 8px; display: flex; gap: 10px; justify-content: center;}
        
        .preview-area { text-align: center; margin-bottom: 15px; }
        canvas { width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: 1px solid #E2E8F0; }

        .btn-share { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 11px;}
    </style>
</head>
<body>

<div class="app-container">
    <h1>Brand Pro <span class="badge">ULTIMATE</span></h1>
    
    <div class="section-title">
        <span>⚙️ Dukan Profile</span>
        <button class="save-btn" onclick="appEngine.saveProfile()">Save Data</button>
    </div>
    <div class="grid-2">
        <div class="input-group">
            <label>Shop Name</label>
            <input type="text" id="shopName" placeholder="Sharma Kirana" oninput="appEngine.render()">
        </div>
        <div class="input-group">
            <label>Mobile No.</label>
            <input type="tel" id="mobileNo" placeholder="9876543210" oninput="appEngine.render()">
        </div>
    </div>
    <div class="input-group">
        <label>Shop Address</label>
        <input type="text" id="address" placeholder="Main Market, Jaipur" oninput="appEngine.render()">
    </div>

    <div class="grid-2" style="margin-bottom: 15px;">
        <div class="file-upload">
            <label for="logoInput">🏢 Upload Logo<br><small>(Fixed Bottom)</small></label>
            <input type="file" id="logoInput" accept="image/*">
        </div>
        <div class="file-upload" style="border-color: #38BDF8; background: #E0F2FE;">
            <label for="productInput">📦 Upload Product<br><small>(Movable Image)</small></label>
            <input type="file" id="productInput" accept="image/*">
        </div>
    </div>

    <div class="input-group" id="newsInputArea" style="display: none;">
        <label>Custom Message (News/Update)</label>
        <textarea id="customText" placeholder="Apni dukan ki taaza khabar yahan likhein..." oninput="appEngine.render()"></textarea>
    </div>

    <div class="button-row">
        <button class="btn-theme btn-greeting" onclick="contentGen.generate('greeting')">☀️ MORNING</button>
        <button class="btn-theme btn-festival" onclick="contentGen.generate('festival')">🎉 FESTIVAL</button>
        <button class="btn-theme btn-offer" onclick="contentGen.generate('offer')">🎁 OFFER</button>
        <button class="btn-theme btn-news" onclick="contentGen.generate('news')">📢 CUSTOM NEWS</button>
    </div>

    <div class="controls-wrapper" id="productControls">
        <label style="font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block;">Adjust Product Image</label>
        <div class="d-pad">
            <div></div>
            <button class="d-btn" onclick="appEngine.moveProduct(0, -20)">⬆️</button>
            <div></div>
            <button class="d-btn" onclick="appEngine.moveProduct(-20, 0)">⬅️</button>
            <button class="d-btn" onclick="appEngine.moveProduct(0, 0)">⏺️</button>
            <button class="d-btn" onclick="appEngine.moveProduct(20, 0)">➡️</button>
            <div></div>
            <button class="d-btn" onclick="appEngine.moveProduct(0, 20)">⬇️</button>
            <div></div>
        </div>
        <div class="zoom-controls">
            <button class="d-btn" onclick="appEngine.scaleProduct(-0.1)">➖ Zoom Out</button>
            <button class="d-btn" onclick="appEngine.scaleProduct(0.1)">➕ Zoom In</button>
        </div>
    </div>

    <div class="preview-area">
        <canvas id="posterCanvas" width="1080" height="1080"></canvas>
    </div>

    <button class="btn-share" onclick="appEngine.sharePoster()">Share on WhatsApp</button>
</div>

<script src="content-generator.js"></script>
<script src="core-engine.js"></script>

</body>
</html>
